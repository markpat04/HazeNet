# HazeNet — config การทดลอง (Lab 0 / feasibility)
# โดเมนจิ๋วรอบเชียงใหม่ สำหรับ walking skeleton

domain:
  name: chiangmai_box
  lat_min: 18.0
  lat_max: 19.5
  lon_min: 98.0
  lon_max: 100.0
  grid_step: 0.1          # องศา -> ~15 x 20 ช่อง

time:
  # เป้าเดิม 03-08..15 ไม่มีข้อมูล PM2.5 (รูข้อมูล) -> ขยับเป็น 03-19..31
  # ซึ่งมีข้อมูลครบ + เป็นเหตุการณ์หมอกควันรุนแรง (PM2.5 พุ่งถึง 420 µg/m³)
  start: "2023-03-19"     # ฤดูเผา (burning season) - เหตุการณ์จริง
  end:   "2023-03-31"
  freq:  "3H"

channels:                 # เริ่มแค่ 4 ช่องสำหรับ skeleton
  - u10                   # ลมแนวตะวันออก-ตก (ERA5)
  - v10                   # ลมแนวเหนือ-ใต้ (ERA5)
  - dem                   # ความสูงภูมิประเทศ (Copernicus DEM)
  - emission             # FRP จาก FIRMS -> rasterize

target: pm25             # PM2.5 จากสถานี (Air4Thai / OpenAQ)

seed: 42

paths:
  raw:       data/raw
  processed: data/processed
