name: hazenet
channels:
  - conda-forge
dependencies:
  - python=3.12
  # core scientific
  - numpy
  - pandas
  - scipy
  - matplotlib
  # geospatial / arrays
  - xarray
  - netcdf4
  - rioxarray
  - rasterio
  - zarr
  - dask
  - s3fs
  - cartopy
  # data download / utils
  - cdsapi
  - requests
  - pyyaml
  - tqdm
  # machine learning
  - scikit-learn
  - xgboost
  # experiment tracking + geospatial (v2: country attribution mask)
  - wandb
  - geopandas
  - shapely
  - pip
  - pip:
      # PyTorch CUDA 12.1 index as EXTRA (so non-torch pkgs still resolve from PyPI).
      # Using --index-url here breaks torchdiffeq (PyTorch index has only torch).
      # Works on RTX 2080 Ti (Turing) and newer.
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch
      # neural-ODE solver — AirPhyNet baseline + Level-3 physics-ODE model (from PyPI)
      - torchdiffeq
  # xesmf (conservative regrid) ลองเพิ่มแยกภายหลัง - บน Windows อาจไม่มี build
