# HazeNet — PI-DGGNN (Level-2, Phase A).
# Same 5-year datacube as local_cds; only the model block changes.
# Key differences vs CLNO (local_cds):
#   model.kind: pidggnn  → uses wind-advection prior in kernel K
#   compute_advection_weights: true → precomputes a_wind (T,S,G) from ERA5 u10/v10
#   pidggnn_alpha_init: 0.0  → starts identical to CLNO; alpha grows during training
#   amp: true → fp16 for speed on RTX 2080 Ti
name: local_cds_pidggnn

domain:
  lat: [14.0, 25.0, 111]
  lon: [96.0, 106.0, 101]
  step: 0.1

time:
  years: [2019, 2020, 2021, 2022, 2023]
  test_year: 2023
  season_months: [2, 3, 4]

features:
  channels: [u10, v10, dem, precip, rh, temp, blh,
             wind_speed, ventilation, inversion, tpi, precip_accum, enso, swvl1]
  precip_accum_window: 3
  tpi_radius: 5
  enso_csv: data/raw_m2/enso/oni.csv

model:
  kind: pidggnn
  hidden: 64
  rank: 32
  dropout: 0.3
  sfeat_hidden: 16
  emission_curve: true
  emission_curve_kind: sat
  quantiles: [0.1, 0.5, 0.9]
  compute_advection_weights: true
  pidggnn_alpha_init: 0.0

train:
  epochs: 200
  batch_size: 32
  lr: 0.001
  weight_decay: 0.001
  grad_clip: 1.0
  amp: true
  seed: 42
  num_workers: 0
  patience: 30

paths:
  grid_nc: data/processed_cds/grid_cds.nc
  pm25_glob: data/raw_m2/pm25/pm25_*.csv
  raw_dir: data/raw_m2
  out_dir: data/processed_cds
  models_dir: models
  figures_dir: figures
