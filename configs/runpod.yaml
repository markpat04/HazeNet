# HazeNet — RUNPOD full-scale config
# 9 burning seasons (Nov–May 2016–2024), full physics channels (needs CDS ERA5
# blh/t850 + a NOAA ONI table), trained on GPU with AMP.
# Build the data first (fetch -> grid -> datacube), upload datacube.zarr to the
# persistent volume, then run --stage train,eval on the pod.
name: runpod

domain:
  lat: [14.0, 25.0, 111]
  lon: [96.0, 106.0, 101]
  step: 0.1

time:
  years: [2016, 2017, 2018, 2019, 2020, 2021, 2022, 2023, 2024]
  test_year: 2023
  season_months: [11, 12, 1, 2, 3, 4, 5]   # full burning season

features:
  channels: [u10, v10, dem, precip, rh, temp, blh,
             wind_speed, ventilation, inversion, tpi, precip_accum, enso, swvl1]
  precip_accum_window: 7
  tpi_radius: 5
  enso_csv: data/raw_big/enso/oni.csv

model:
  kind: globalv          # station-agnostic CLNO (validated); NOT lowrank
  hidden: 96
  rank: 48
  dropout: 0.3           # matched the local_cds validated setting
  sfeat_hidden: 16
  emission_curve: true
  emission_curve_kind: sat   # Sprint 2: curve shape had no effect; keep default
  quantiles: [0.1, 0.5, 0.9]
  # lds left OFF by default (Sprint 1: fixes bias but costs MAE on small data;
  # re-evaluate on the full 9-year cube where the extreme tail is better sampled)

train:
  epochs: 400
  batch_size: 64
  lr: 0.001
  weight_decay: 0.0001
  grad_clip: 1.0
  amp: true                   # GPU
  seed: 42
  num_workers: 4

paths:
  grid_nc: data/processed_big/grid_big.nc
  pm25_glob: data/raw_big/pm25/pm25_*.csv
  raw_dir: data/raw_big
  out_dir: data/processed_big
  models_dir: models
  figures_dir: figures
