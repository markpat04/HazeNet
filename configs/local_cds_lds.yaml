# HazeNet — Sprint 1 experiment: Label Distribution Smoothing (LDS) loss.
# Identical to local_cds.yaml EXCEPT train.lds=true, so it reuses the SAME
# datacube (data/processed_cds) and only changes the loss weighting.
# Ref: Yang et al., "Delving into Deep Imbalanced Regression", ICML 2021.
name: local_cds_lds

domain:
  lat: [14.0, 25.0, 111]
  lon: [96.0, 106.0, 101]
  step: 0.1

time:
  years: [2019, 2020, 2021, 2022, 2023]
  test_year: 2023
  season_months: [2, 3, 4]

features:
  channels: [u10, v10, dem, precip, rh, temp, blh,
             wind_speed, ventilation, inversion, tpi, precip_accum, enso, swvl1]
  precip_accum_window: 3
  tpi_radius: 5
  enso_csv: data/raw_m2/enso/oni.csv

model:
  kind: globalv
  hidden: 64
  rank: 32
  dropout: 0.3
  sfeat_hidden: 16
  emission_curve: true
  quantiles: [0.1, 0.5, 0.9]

train:
  epochs: 200
  batch_size: 32
  lr: 0.001
  weight_decay: 0.001
  grad_clip: 1.0
  amp: false
  seed: 42
  num_workers: 0
  patience: 30
  # ── Sprint 1: imbalanced-regression loss ──
  lds: true
  lds_reweight: sqrt_inv
  lds_sigma: 2.0
  lds_max_weight: 10.0

paths:
  grid_nc: data/processed_cds/grid_cds.nc
  pm25_glob: data/raw_m2/pm25/pm25_*.csv
  raw_dir: data/raw_m2
  out_dir: data/processed_cds
  models_dir: models
  figures_dir: figures
