# HazeNet — LOCAL overfit-control experiment.
# Same 446-day datacube as local.yaml, but a much smaller model (globalv, ~0.56M
# params vs 23.6M) + stronger regularisation + early stopping, to separate the
# "training method" gap from the real 2023 data gap.
name: local_globalv

domain:
  lat: [14.0, 25.0, 111]
  lon: [96.0, 106.0, 101]
  step: 0.1

time:
  years: [2019, 2020, 2021, 2022, 2023]
  test_year: 2023
  season_months: [2, 3, 4]

features:
  channels: [u10, v10, dem, precip, rh, temp, wind_speed, tpi, precip_accum]
  precip_accum_window: 3
  tpi_radius: 5
  enso_csv: null

model:
  kind: globalv               # shared spatial basis V → ~0.56M params (anti-overfit)
  hidden: 64
  rank: 32
  dropout: 0.3                # ↑ from 0.1
  emission_curve: true
  quantiles: [0.1, 0.5, 0.9]

train:
  epochs: 200
  batch_size: 32
  lr: 0.001
  weight_decay: 0.001         # ↑ 10× from 1e-4
  grad_clip: 1.0
  amp: false
  seed: 42
  num_workers: 0
  patience: 30                # early stop if test loss stalls 30 epochs

paths:
  grid_nc: data/processed_m2/grid_m2.nc
  pm25_glob: data/raw_m2/pm25/pm25_*.csv
  raw_dir: data/raw_m2
  out_dir: data/processed_hn
  models_dir: models
  figures_dir: figures
